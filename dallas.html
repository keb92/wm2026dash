<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Dallas · WM 2026</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="city" data-city="dallas">
  <main class="shell city-shell">
    <header class="city-header glass-card">
      <a href="index.html" class="btn btn-secondary">← Dashboard</a>
      <div>
        <h1 id="cityTitle"></h1>
        <p id="cityDate" class="muted"></p>
        <p id="cityMeta" class="tiny-meta"></p>
      </div>
    </header>

    <article class="map-wrap glass-card">
      <div id="mapStatus" class="map-status hidden" role="status"></div>
      <div id="map" class="city-map" aria-label="Stadtkarte"></div>
      <div id="categoryChips" class="chip-row"></div>
      <div id="mapFallback" class="map-fallback hidden">Karte konnte nicht geladen werden. Bitte Seite neu laden.</div>
      <button id="legendToggle" class="legend-toggle" type="button">Legende</button>
      <div id="legend" class="legend"></div>
    </article>

    <section class="city-bottom-grid">
      <article class="glass-card">
        <h2>Eigene Einträge</h2>
        <form id="customPointForm" class="grid-form" novalidate>
          <label>Name<input name="name" required /></label>
          <label>Kategorie
            <select name="category" id="customCategory" required></select>
          </label>
          <label>Adresse/Notiz<textarea name="address" rows="2" placeholder="z. B. Treffpunkt vor Spiel"></textarea></label>
          <label>Lat<input name="lat" type="number" step="any" required /></label>
          <label>Lon<input name="lon" type="number" step="any" required /></label>
          <button type="submit" class="btn btn-primary">Hinzufügen</button>
        </form>
        <p id="formMessage" class="muted" aria-live="polite"></p>
      </article>

      <article class="glass-card">
        <h2>Gespeicherte Spots</h2>
        <ul id="customPointList" class="entry-list"></ul>
      </article>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="city-data.js"></script>
  <script src="app.js"></script>
  <script src="city-page.js"></script>
</body>
</html>
