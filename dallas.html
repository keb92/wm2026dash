<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dallas · WM 2026</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="city" data-city="dallas">
  <main class="shell">
    <header class="city-header card">
      <a href="index.html" class="btn btn-secondary">← Zurück zum Dashboard</a>
      <div>
        <h1 id="cityTitle">Dallas</h1>
        <p id="cityMeta" class="muted"></p>
      </div>
    </header>

    <section class="city-layout">
      <article class="card map-card">
        <div id="map" class="map"></div>
        <button id="legendToggle" class="legend-toggle">Legende</button>
        <div id="legend" class="legend">
          <div class="title">Legende</div>
          <div class="row"><span class="dot fan"></span>Fan Hub / Fan Zone</div>
          <div class="row"><span class="dot stadium"></span>Stadion</div>
          <div class="row"><span class="dot airport"></span>Flughafen</div>
          <div class="row"><span class="dot pub"></span>Soccer-Pub</div>
          <div class="row"><span class="dot sight"></span>Sehenswürdigkeit</div>
          <div class="row"><span class="dot custom"></span>Eigene Einträge</div>
        </div>
      </article>

      <aside class="card form-card">
        <h2>Eigene Einträge hinzufügen</h2>
        <form id="customPointForm" class="stack" novalidate>
          <label>Name<input name="name" required /></label>
          <label>Kategorie
            <select name="category" required>
              <option value="Fan Hub">Fan Hub / Fan Zone</option>
              <option value="Stadium">Stadion</option>
              <option value="Airport">Flughafen</option>
              <option value="Soccer Pub">Soccer-Pub</option>
              <option value="Sight">Sehenswürdigkeit</option>
            </select>
          </label>
          <label>Adresse / Notiz<textarea name="address" rows="2"></textarea></label>
          <label>Latitude<input name="lat" type="number" step="any" required /></label>
          <label>Longitude<input name="lon" type="number" step="any" required /></label>
          <button class="btn btn-primary" type="submit">Hinzufügen</button>
          <p id="formMessage" class="muted"></p>
        </form>

        <h3>Eigene Einträge</h3>
        <ul id="customPointList" class="entry-list"></ul>
      </aside>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="city-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
