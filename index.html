<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>WM 2026 Reiseplanung</title>
  <link rel="preconnect" href="https://unpkg.com" />
  <link rel="preconnect" href="https://api.open-meteo.com" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="dashboard">
  <div id="loginOverlay" class="overlay" aria-modal="true" role="dialog">
    <div class="login-card glass-card">
      <p class="eyebrow">Roadtrip-Planer</p>
      <h1>WM 2026 Reiseplanung</h1>
      <p class="muted">Komfortschutz aktiv</p>
      <form id="loginForm" class="stack" novalidate>
        <label for="passwordInput">Passwort</label>
        <input id="passwordInput" type="password" autocomplete="current-password" placeholder="••••••••••" required />
        <button type="submit" class="btn btn-primary">Dashboard öffnen</button>
        <p id="loginError" class="error-msg" aria-live="polite"></p>
      </form>
    </div>
  </div>

  <main id="dashboard" class="shell hidden" aria-hidden="true">
    <header class="hero glass-card">
      <div>
        <p class="eyebrow">FIFA World Cup 2026 • USA</p>
        <h1>WM 2026 Reiseplanung</h1>
        <p class="muted">Kompakt planen: Stadt wählen, Wetter prüfen, Spots speichern.</p>
      </div>
      <div class="hero-actions">
        <p class="meta-chip">Reisefenster Juni/Juli 2026</p>
        <p id="countdown" class="kpi-pill">Countdown lädt…</p>
        <button id="logoutBtn" class="btn btn-secondary">Logout</button>
      </div>
    </header>

    <section>
      <div class="section-head">
        <h2>Wetterüberblick</h2>
      </div>
      <div id="weatherCards" class="weather-grid"></div>
    </section>

    <section>
      <div class="section-head">
        <h2>Städte</h2>
      </div>
      <div id="cityCards" class="city-grid"></div>
    </section>

    <section>
      <div id="quickStats" class="quick-grid"></div>
    </section>
  </main>

  <script src="city-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
